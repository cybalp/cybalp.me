# ❯ ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# ❯ @status OK!
# ❯ @path ./public/admin/config.yml
# ❯ @desc Netlify CMS configuration for content management.
# ❯ ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

# ❯ BACKEND CONFIGURATION
backend:
    name: github
    repo: cybalp/cybalp.me
    branch: main
    site_domain: cybalp.me
    base_url: https://cybalp.me
    auth_endpoint: oauth

# ❯ LOCALIZATION
locale: en

# ❯ MEDIA STORAGE
media_folder: "public/assets/images"
public_folder: "/assets/images"

# ❯ CONTENT COLLECTIONS
collections:

    # ❯ Blog Posts Collection
    -
        name: "posts"
        label: "Posts"
        folder: "src/content/posts"
        meta:
            path:
                label: "Path"
                widget: hidden
                index_file: "_index"
        nested:
            depth: 10
            summary: '{{dirname}}'
            subfolders: false
        media_folder: ""
        public_folder: ""
        create: true
        slug: "{{slug}}"
        format: "frontmatter"
        extension: "md"
        fields:
            -
                {label: "Title", name: "title", widget: "string"}
            -
                {label: "Published Date", name: "published", widget: "datetime"}
            -
                {label: "Updated Date", name: "updated", widget: "datetime", required: false}
            -
                {label: "Description", name: "description", widget: "text", required: false}
            -
                {label: "Cover", name: "cover", widget: "image", required: false}
            -
                {label: "Cover In Content", name: "coverInContent", widget: "boolean", default: false, required: false}
            -
                {label: "Pinned", name: "pinned", widget: "boolean", default: false, required: false}
            -
                {label: "Tags", name: "tags", widget: "string", required: false, hint: "Comma-separated tags"}
            -
                {label: "Category", name: "category", widget: "string", required: false}
            -
                {label: "Draft", name: "draft", widget: "boolean", default: false}
            -
                {label: "Comment", name: "comment", widget: "boolean", default: true, required: false}
            -
                {label: "Encrypted", name: "encrypted", widget: "boolean", default: false, required: false}
            -
                {label: "Password", name: "password", widget: "string", required: false}
            -
                {label: "License Name", name: "licenseName", widget: "string", required: false}
            -
                {label: "Author", name: "author", widget: "string", required: false}
            -
                {label: "Source Link", name: "sourceLink", widget: "string", required: false}
            -
                {label: "Body", name: "body", widget: "markdown"}

    # ❯ PersonalLog Entries Collection
    -
        name: "PersonalLog"
        label: "Personal Log"
        folder: "src/content/PersonalLog"
        path: "{{slug}}/{{slug}}"
        media_folder: ""
        public_folder: ""
        create: true
        slug: "{{year}}-{{month}}-{{day}}-{{hour}}-{{minute}}"
        format: "json"
        fields:
            -
                {label: "Title", name: "title", widget: "string"}
            -
                {label: "Content", name: "content", widget: "text"}
            -
                {label: "Date", name: "date", widget: "datetime"}
            -
                label: "Images"
                name: "images"
                widget: "list"
                required: false
                default: []
                field: {label: "Image", name: "image", widget: "image"}

    # ❯ Practical Codes Collection
    -
        name: "practical-codes"
        label: "Practical Codes"
        folder: "src/content/practical-codes"
        path: "{{slug}}"
        media_folder: ""
        public_folder: ""
        create: true
        slug: "{{slug}}"
        format: "frontmatter"
        extension: "md"
        fields:
            -
                {label: "Title", name: "title", widget: "string"}
            -
                {label: "Description", name: "description", widget: "text", required: false}
            -
                {label: "Language", name: "language", widget: "select", options: ["bash","javascript","typescript","python","java","cpp","c","html","css","sql","docker","other"], default: "bash"}
            -
                label: "Tags"
                name: "tags"
                widget: "list"
                required: false
                default: []
                field: {label: "Tag", name: "tag", widget: "string"}
            -
                {label: "Date", name: "date", widget: "datetime"}
            -
                {label: "Code", name: "body", widget: "code", default_language: "bash", hint: "Enter your code in a code block. The language will be automatically detected from the frontmatter."}

    # ❯ Media Collection
    -
        name: "media"
        label: "Media"
        folder: "src/content/media"
        path: "{{slug}}/{{slug}}"
        media_folder: ""
        public_folder: ""
        create: true
        slug: "{{slug}}"
        format: "json"
        fields:
            -
                {label: "Title", name: "title", widget: "string"}
            -
                {label: "Description", name: "description", widget: "text", required: false}
            -
                {label: "Cover", name: "cover", widget: "image"}
            -
                {label: "Date", name: "date", widget: "datetime"}
            -
                {label: "URL", name: "url", widget: "string", required: false, hint: "External link (e.g., GitHub repository)"}
            -
                {label: "Location", name: "location", widget: "string", required: false}
            -
                {label: "Tags", name: "tags", widget: "list", required: false, default: []}
            -
                {label: "Layout", name: "layout", widget: "select", options: ["grid", "masonry", "list"], default: "grid"}
            -
                {label: "Columns", name: "columns", widget: "number", default: 3, value_type: "int", min: 1, max: 6}
            -
                label: "Photos"
                name: "photos"
                widget: "list"
                required: false
                fields:
                    -
                        {label: "Image", name: "src", widget: "image"}
                    -
                        {label: "Caption", name: "alt", widget: "string", required: false}
                    -
                        {label: "Title", name: "title", widget: "string", required: false}
                    -
                        {label: "Description", name: "description", widget: "text", required: false}
                    -
                        {label: "Tags", name: "tags", widget: "list", required: false, default: []}
                    -
                        {label: "Date", name: "date", widget: "datetime", required: false}
            -
                {label: "Visible", name: "visible", widget: "boolean", default: true, required: false}

    # ❯ AR-GE Collection
    -
        name: "arge"
        label: "AR-GE"
        folder: "src/content/arge"
        path: "{{slug}}/{{slug}}"
        media_folder: ""
        public_folder: ""
        create: true
        slug: "{{slug}}"
        format: "json"
        fields:
            -
                {label: "Title", name: "title", widget: "string"}
            -
                {label: "Description", name: "description", widget: "text"}
            -
                {label: "Image", name: "image", widget: "image", required: false}
            -
                {label: "Category", name: "category", widget: "select", options: ["library","ai","software","website","game","security"], default: "software"}
            -
                {label: "Tech Stack", name: "techStack", widget: "list", default: [], field: {label: "Technology", name: "tech", widget: "string"}}
            -
                {label: "Status", name: "status", widget: "select", options: ["completed","in-progress","planned"], default: "in-progress"}
            -
                {label: "Live Demo", name: "liveDemo", widget: "string", required: false}
            -
                {label: "Source Code", name: "sourceCode", widget: "string", required: false}
            -
                {label: "Start Date", name: "startDate", widget: "datetime"}
            -
                {label: "End Date", name: "endDate", widget: "string", required: false, hint: "Leave empty for ongoing AR-GE"}
            -
                {label: "Featured", name: "featured", widget: "boolean", required: false, default: false}
            -
                {label: "Tags", name: "tags", widget: "list", required: false, default: [], field: {label: "Tag", name: "tag", widget: "string"}}

    # ❯ Toolchains Collection
    -
        name: "toolchains"
        label: "Toolchains"
        folder: "src/content/toolchains"
        create: true
        slug: "{{slug}}"
        format: "json"
        fields:
            -
                {label: "Name", name: "name", widget: "string"}
            -
                {label: "Description", name: "description", widget: "text"}
            -
                {label: "Icon", name: "icon", widget: "string"}
            -
                {label: "Category", name: "category", widget: "select", options: ["cybersecurity","backend","frontend","area-of-interest","others"]}
            -
                {label: "Level", name: "level", widget: "select", options: ["beginner","intermediate","advanced","expert"]}
            -
                label: "Experience"
                name: "experience"
                widget: "object"
                fields:
                    -
                        {label: "Years", name: "years", widget: "number", value_type: "int", min: 0}
                    -
                        {label: "Months", name: "months", widget: "number", value_type: "int", min: 0, max: 11}
            -
                {label: "AR-GE", name: "projects", widget: "list", required: false, default: []}
            -
                {label: "Certifications", name: "certifications", widget: "list", required: false, default: []}
            -
                {label: "Color", name: "color", widget: "string", required: false}

# ❯ EDITOR SETTINGS
editor:
    preview: true
